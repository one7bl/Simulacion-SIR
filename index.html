<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulación SIR - Dashboard Docente</title>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/dashboard.css">
  
  <!-- CDNs de Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
</head>
<body>

  <div class="dashboard-container">
    
    <!-- Cabecera -->
    <header class="dashboard-header">
      <h1 class="dashboard-title">
        🦠 Simulación Epidémica SIR
      </h1>
      <div class="status-indicator">
        <span id="indicadorRealtime" class="dot desconectado"></span>
        <span>Base de Datos</span>
      </div>
    </header>

    <!-- Layout Principal -->
    <main class="dashboard-grid">
      
      <!-- Panel Lateral (Parámetros y QR) -->
      <aside class="controls-panel glass-panel">
        <h3>Parámetros del Modelo</h3>
        
        <div class="control-group">
          <label for="beta">
            <span>Tasa de Infección (β)</span>
            <span id="betaValor">0.3</span>
          </label>
          <input type="range" id="beta" min="0.1" max="1.0" step="0.01" value="0.3">
        </div>

        <div class="control-group">
          <label for="gamma">
            <span>Tasa de Recuperación (γ)</span>
            <span id="gammaValor">0.1</span>
          </label>
          <input type="range" id="gamma" min="0.01" max="0.5" step="0.01" value="0.1">
        </div>

        <button id="btnInteractuar" class="btn-primary">
          EJECUTAR INTERACCIÓN (Paso +1)
        </button>

        <button id="btnReiniciar" class="btn-danger">
          Reiniciar Sesión
        </button>

        <div class="qr-container">
          <p>Escanea para unirte:</p>
          <div id="qrCode"></div>
        </div>
      </aside>

      <!-- Panel Principal (Contadores y Gráfica) -->
      <section class="main-panel">
        
        <!-- Contadores Poblacionales -->
        <div class="counters-row">
          <div class="counter-card glass-panel s">
            <span class="counter-label">Susceptibles</span>
            <span class="counter-value" id="contadorS">0</span>
          </div>
          <div class="counter-card glass-panel i">
            <span class="counter-label">Infectados</span>
            <span class="counter-value" id="contadorI">0</span>
          </div>
          <div class="counter-card glass-panel r">
            <span class="counter-label">Recuperados</span>
            <span class="counter-value" id="contadorR">0</span>
          </div>
        </div>

        <!-- Gráfica Histórica -->
        <div class="chart-container glass-panel">
          <canvas id="sirChartCanvas"></canvas>
        </div>

      </section>

    </main>
  </div>

  <!-- Controlador Lógico (Módulo) -->
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
