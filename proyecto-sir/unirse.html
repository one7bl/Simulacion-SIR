<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unirse - Simulación SIR</title>
  
  <!-- Estilos -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/unirse.css">
</head>
<body>

  <div class="mobile-container glass-panel">
    
    <!-- Formulario de Ingreso -->
    <div id="viewForm">
      <header class="header">
        <h1>🦠 Simulación SIR</h1>
        <p>Únete a la simulación interactiva</p>
      </header>

      <form id="formUnirse">
        <div class="form-group">
          <label for="nombreInput">Tu Nombre o Alias</label>
          <input type="text" id="nombreInput" class="input-text" placeholder="Ej: Estudiante 1" required>
        </div>

        <div class="form-group">
          <label>Estado Inicial</label>
          <div class="status-selector">
            
            <label class="radio-option">
              <input type="radio" name="estado" value="S" checked>
              <div class="radio-label">
                <span class="icon">🔵</span>
                Susceptible
              </div>
            </label>

            <label class="radio-option">
              <input type="radio" name="estado" value="I">
              <div class="radio-label">
                <span class="icon">🔴</span>
                Infectado
              </div>
            </label>

          </div>
        </div>

        <button type="submit" id="btnUnirse" class="btn-block">
          Unirse a la Simulación
        </button>
      </form>
    </div>

    <!-- Vista de Espera / Simulación Activa -->
    <div id="viewWaiting" class="waiting-view hidden">
      <div class="spinner"></div>
      
      <div>
        <h2 id="statusTitle" class="status-badge">Estado: -</h2>
      </div>

      <p>Esperando la siguiente interacción del docente...</p>
      <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2rem;">
        No cierres esta ventana.
      </p>
    </div>

  </div>

  <!-- Controlador Lógico (Módulo) -->
  <script type="module" src="js/unirse.js"></script>
</body>
</html>
